<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>aime.io deployment solutions</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; line-height: 1.5; }
      code { background: #f5f5f5; padding: 0.1rem 0.3rem; border-radius: 4px; }
      .ok { color: #0a7a23; }
    </style>
  </head>
  <body>
    <h1>aime.io automation status</h1>
    <p class="ok" id="result">Loading latest check...</p>
    <ul>
      <li>status payload: <code>/status.json</code></li>
      <li>machine-readable solutions: <code>/solutions.json</code></li>
      <li>human-readable solutions: <code>/solutions.md</code></li>
    </ul>
    <pre id="meta"></pre>
    <script>
      fetch('./status.json')
        .then(r => r.json())
        .then(data => {
          document.getElementById('result').textContent = `Latest result: ${data.result} for ${data.domain}`;
          document.getElementById('meta').textContent = JSON.stringify(data, null, 2);
        })
        .catch(() => {
          document.getElementById('result').textContent = 'Status file not available yet. Run workflow once.';
        });
    </script>
  </body>
</html>
