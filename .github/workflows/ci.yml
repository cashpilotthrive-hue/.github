name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck setup.sh
          shellcheck install.sh
          for script in scripts/*.sh; do
            echo "Linting $script"
            shellcheck "$script"
          done

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Syntax check shell scripts
        run: |
          bash -n setup.sh
          bash -n install.sh
          for script in scripts/*.sh; do
            echo "Checking $script"
            bash -n "$script"
          done

      - name: Smoke test setup.sh
        run: |
          echo "Scripts are syntactically correct"
          echo "Note: Full installation requires sudo and is not run in CI"

  attest:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build release tarball
        run: tar -czf release.tar.gz setup.sh install.sh scripts/ dotfiles/ config/

      - name: Compute sha256 digest
        run: sha256sum release.tar.gz

      - name: Attest build provenance
        uses: actions/attest-build-provenance@c5efebd311e9a809e832398ca2b73bb429ff3508 # v4.1.0
        with:
          subject-path: release.tar.gz

      - name: Upload release tarball
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release
          path: release.tar.gz

      - name: Dump attestation bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh attestation download release.tar.gz --owner "${{ github.repository_owner }}" --format json | jq .
