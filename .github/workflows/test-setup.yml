name: Test Linux Setup Scripts

on:
  push:
    branches: [ main, copilot/* ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Verify script permissions
        run: |
          ls -la packages/setup/setup.sh
          ls -la packages/setup/scripts/

      - name: Test syntax of shell scripts
        run: |
          bash -n packages/setup/setup.sh
          for script in packages/setup/scripts/*.sh; do
            echo "Checking $script"
            bash -n "$script"
          done

      - name: Verify dotfiles exist
        run: |
          test -f packages/setup/dotfiles/.bashrc
          test -f packages/setup/dotfiles/.gitconfig
          test -f packages/setup/dotfiles/.vimrc
          test -f packages/setup/dotfiles/.tmux.conf

      - name: Test script execution (dry-run)
        run: |
          echo "Scripts are executable and syntactically correct"
          echo "Note: Full installation requires sudo and is not run in CI"

  validate-structure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate repository structure
        run: |
          echo "Checking monorepo directory structure..."
          test -d packages/setup/scripts
          test -d packages/setup/dotfiles
          test -d packages/setup/config
          test -f packages/setup/setup.sh
          test -d packages/realtime
          test -d docs
          test -f README.md
          echo "✓ Directory structure is valid"

      - name: Check README content
        run: |
          grep -q "Personal Linux System Setup" README.md
          echo "✓ README contains expected content"
