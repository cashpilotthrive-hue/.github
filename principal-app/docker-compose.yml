version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: "file:/data/principal.db"
      PORT: "4000"
      HOST: "0.0.0.0"
    volumes:
      - db-data:/data
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE: "http://backend:4000"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db-data:
