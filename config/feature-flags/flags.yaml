# Feature flags for the betting platform
social_workflows:
  support_service:
    enabled: true
    allow_attachments: true
    max_attachment_size_mb: 5
  gdpr_service:
    enabled: true
    auto_approve_exports: false
  notifications:
    email_enabled: true
    sms_enabled: false
  responsible_gambling:
    reality_check_interval_min: 60
    self_exclusion_enabled: true
